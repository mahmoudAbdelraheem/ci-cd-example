name: Android Fastlane with firebase App Distirbution workflow
on:
  push:
    branches:
      - main
  # pull_request:
  #     branches:
  #         - main
jobs:
  distribute_to_firebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my repo code
        uses: actions/checkout@v4

      - name: Set Up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Flutter
        uses: subosito/flutter-action@v4
        with:
          flutter-version: "3.44.1"
        #   channel: "stable"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
          working-directory: android

      - name: Build and distribute to firebase
        env:
          FIRBASE_CLI_TOKEN: ${{ secrets.FIRBASE_CLI_TOKEN }}
        run: |
          bundle exec fastlane android test_app_distribution
        working-directory: android
